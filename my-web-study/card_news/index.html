<!DOCTYPE html>
<lang = "ko">
    <head>
        <meta charset="UTF-8">
        <title>카드 뉴스 페이지</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <header class="navbar">
            <div class="logo">Mynews</div>
            <nav>
                <a href="#">홈</a>
                <a href="#">카테고리</a>
                <a href="#">로그인</a>
            </nav>
    </header>
    <main class = "container">
        <h1 class="title">주요 뉴스</h1>
        <div class="card-wrapper">
            <article class = "card">
                <img src="https://play.google.com/store/apps/details?id=kr.pull.today_news&hl=ln" alt ="News" class="card-img">
                <div class="card-content">
                    <span class="badge">기술</span>
                    <h2>퍼블리싱의 시작</h2>
                    <p>HTML과 CSS로 나만의 웹사이트를 만드는 방법...</p>
                </div>
            </article>
        </div>
    </main>

    <main class="container">
        <h1 class="title">최신 뉴스</h1>
        <div class="card-wrapper">
            <article class="card">
                <div class="card-image">이미지 1</div>
                <div class="card-content">
                    <h2>퍼블리싱의 시작</h2>
                    <p>HTML과 CSS로 나만의 웹사이트를 만드는 방법을 알아보자</p>
                </div>
            </article>
            <article class="card">
                <div class="card-image">이미지 2</div>
                <div class=""card-content">
                    <h2>Git과 GitHub</h2>
                    <p>버전 관리와 협업을 위한 필수 도구인 Git과 GitHub에 대해 알아보자</p>
                </div>
            </article>
            <article class="card">
                <div class="card-image">이미지 3</div>
                <div class="card-content">
                    <h2>반응형 웹이란?</h2>
                    <p>화면 크기에 따라 변하는 유연한 레이아웃을 구축합니다.</p>
                    <button class="like-btn">❤️<span class="count">0</span>
                    </button>
                </div>
            </article>
        </div>
        <script src="script.js"></script>
    </main>
