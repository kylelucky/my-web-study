<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숫자 맞추기 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🎯 숫자 맞추기</h1>
        <p class="subtitle">1부터 100 사이의 숫자를 맞춰보세요!</p>
        <div class="attempts">시도 횟수: <span class="count" id="attemptCount">0</span></div>
        <div class="input-area">
            <input type="number" id="guessInput" min="1" max="100" placeholder="숫자 입력">
            <button id="guessBtn">확인</button>
        </div>
        <div class="message" id="message"></div>
        <div class="history" id="history"></div>
        <button class="reset-btn" id="resetBtn">새 게임 시작</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
