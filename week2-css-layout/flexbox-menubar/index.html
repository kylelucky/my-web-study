<!DOCTYPE html>
<html lang = "ko">
<head>   
    <meta charset="UTF-8">
    <title>Flexbox 메뉴바 실습</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: 'Arial', sans-serif;
        }

        nav{
            background-color: skyblue;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo{
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links{
            list-style: none;
            display: flex;
            gap: 20px;
        }
        .nav-links a{
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links a:hover{
            color: #ff9900;
            
        }

        @media (max-width: 768px){
            nav{
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-links{
                flex-direction: column;
                gap: 10px;
                padding-top: 10px;
                gap: 10px;
            }

            .nav-links li{
                width: 100%;
                border-bottom: 1px solid #444;
                padding: 5px 0;
            }
        }
    </style>

</head>
<body>

    <nav>
        <a href="#" class="logo">MyBrand</a>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <script>
        const menuItems = document.querySelectorAll('.nav-links a');
        menuItems.forEach((item) => {
            item.addEventListener('click', function(event) {
                //event.preventDefault();
                const menuName = this.textContent;

                alert(menuName + ' 메뉴가 클릭되었습니다!');

                console.log(menuName + ' 메뉴가 클릭되었습니다!');
            });
        })
    </script>
</body>
</html>
