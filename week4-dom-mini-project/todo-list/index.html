<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일 목록</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 할 일 목록</h1>
            <p class="date" id="today"></p>
        </header>
        <div class="input-area">
            <input type="text" id="todoInput" placeholder="할 일을 입력하세요..." maxlength="100">
            <button id="addBtn">추가</button>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="active">미완료</button>
            <button class="filter-btn" data-filter="completed">완료</button>
        </div>
        <ul class="todo-list" id="todoList"></ul>
        <div class="footer">
            <span id="remaining">0개 남음</span>
            <button id="clearBtn">완료 항목 삭제</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
